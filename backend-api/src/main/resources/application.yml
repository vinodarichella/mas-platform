spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mas_platform}
    username: ${DB_USERNAME:mas}
    password: ${DB_PASSWORD:mas}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Serve React SPA — all non-API paths resolve to index.html
  mvc:
    throw-exception-if-no-handler-found: false
  web:
    resources:
      static-locations: classpath:/static/
      add-mappings: true

server:
  port: ${PORT:8080}
  servlet:
    context-path: /

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-256-bit-key}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}    # 24 hours
  execution-engine:
    url: ${ENGINE_URL:http://localhost:8001}
    internal-api-key: ${INTERNAL_API_KEY:change-me-in-production}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:8080}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    chat-per-minute: ${RATE_LIMIT_CHAT:10}
    general-per-minute: ${RATE_LIMIT_GENERAL:100}

resilience4j:
  circuitbreaker:
    instances:
      engine:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        waitDurationInOpenState: 60s
        permittedNumberOfCallsInHalfOpenState: 2
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    com.masplatform: DEBUG
    org.springframework.security: INFO
